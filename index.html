<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>密码验证</title>
    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
            color: white;
        }

        .box {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 300px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 15px;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            width: 100%;
            background: #1cc88a;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #17a673;
        }

        .error {
            margin-top: 10px;
            color: #ffdddd;
            font-size: 14px;
            display: none;
        }

        .shake {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>

    <script>
        const correctPassword = "MTg2MA=="; // 1860 的 Base64

        function checkPassword() {
            const input = document.getElementById("pwd").value;
            const error = document.getElementById("error");
            const encoded = btoa(input);

            if (encoded === correctPassword) {
                window.location.href = "menu.html"; // 跳转到菜单页面
            } else {
                error.style.display = "block";
                const box = document.querySelector(".box");
                box.classList.add("shake");

                setTimeout(() => {
                    box.classList.remove("shake");
                }, 300);
            }
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                checkPassword();
            }
        });
    </script>
</head>

<body>
    <div class="box">
        <h2>请输入密码</h2>
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="checkPassword()">确认</button>
        <div id="error" class="error">❌ 密码错误，请重试</div>
    </div>
</body>
</html>
